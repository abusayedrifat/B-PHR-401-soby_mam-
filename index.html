    <style>

        --bg: #0a0f1e;
        --card: rgba(255, 255, 255, 0.04);
        --border: rgba(232, 200, 122, 0.18);
        --text: #f0ece0;
        --muted: #8a8fa8;
        --gold: #e8c87a; /* primary accent   */
        --blue: #5b8dee; /* secondary accent */
        --red: #e87a7a; /* tertiary accent  */
        --font-display: "Playfair Display", serif;
        --font-body: "DM Sans", sans-serif;
      }

      /* reset */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-body);
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      /* deck */
      #deck {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      .slide {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 60px 80px;
        opacity: 0;
        pointer-events: none;
      }
      .slide::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background:
          radial-gradient(
            ellipse 70% 60% at 80% 20%,
            rgba(91, 141, 238, 0.07) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 50% 40% at 10% 80%,
            rgba(232, 200, 122, 0.05) 0%,
            transparent 60%
          );
      }
      .slide > * {
        position: relative;
        z-index: 1;
      }
      .slide.active {
        opacity: 1;
        pointer-events: all;
      }

      /* animations */
      @keyframes exitL {
        to {
          transform: translateX(-110vw);
          opacity: 0;
        }
      }
      @keyframes exitR {
        to {
          transform: translateX(110vw);
          opacity: 0;
        }
      }
      @keyframes enterR {
        from {
          transform: translateX(110vw);
          opacity: 0;
        }
        to {
          transform: none;
          opacity: 1;
        }
      }
      @keyframes enterL {
        from {
          transform: translateX(-110vw);
          opacity: 0;
        }
        to {
          transform: none;
          opacity: 1;
        }
      }
      .exit-l {
        animation: exitL 0.45s cubic-bezier(0.6, 0, 1, 0.4) forwards;
      }
      .exit-r {
        animation: exitR 0.45s cubic-bezier(0.6, 0, 1, 0.4) forwards;
      }
      .enter-r {
        animation: enterR 0.55s cubic-bezier(0.22, 0.8, 0.35, 1) forwards;
      }
      .enter-l {
        animation: enterL 0.55s cubic-bezier(0.22, 0.8, 0.35, 1) forwards;
      }

      /* nav chrome */
      #slideNum {
        position: fixed;
        top: 24px;
        right: 30px;
        z-index: 200;
        background: var(--gold);
        color: var(--bg);
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 14px;
        padding: 8px 18px;
        border-radius: 50px;
        box-shadow: 0 4px 20px rgba(232, 200, 122, 0.3);
      }
      .nav-btn {
        position: fixed;
        bottom: 36px;
        z-index: 200;
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--gold);
        font-family: var(--font-body);
        font-size: 15px;
        font-weight: 500;
        padding: 14px 34px;
        border-radius: 50px;
        cursor: pointer;
        backdrop-filter: blur(12px);
        transition: all 0.25s;
      }
      .nav-btn:hover {
        background: var(--gold);
        color: var(--bg);
        box-shadow: 0 6px 30px rgba(232, 200, 122, 0.35);
      }
      #prevBtn {
        left: 36px;
      }
      #nextBtn {
        right: 36px;
      }
      #progress {
        position: fixed;
        bottom: 0;
        left: 0;
        height: 3px;
        background: var(--gold);
        z-index: 200;
        transition: width 0.4s ease;
        box-shadow: 0 0 12px rgba(232, 200, 122, 0.6);
      }

      }

      .conclusion-grid {
        display: grid;

        gap: 16px;
        width: 100%;
      }
      .conclusion-card {

        padding: 22px;

        gap: 14px;

        margin-top: 6px;

      }

      .chart-wrap {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .chart-caption {
        font-size: 11px;
        color: var(--muted);
        text-align: center;
        margin-top: 6px;
      }
      canvas {
        max-height: 240px;
      }
    </style>

      // ── component builders ──

      function card(c) {
        let h = `<div class="card">`;
        if (c.heading) h += `<h3>${c.heading}</h3>`;
        if (c.body) h += `<p>${c.body}</p>`;
        if (c.bullets)
          h += `<ul class="blist">${c.bullets.map((b) => `<li>${b}</li>`).join("")}</ul>`;
        if (c.steps)
          h += `<ol class="slist">${c.steps.map((s) => `<li>${s}</li>`).join("")}</ol>`;
        if (c.tags)
          h += `<div class="tags">${c.tags.map((t) => `<span class="tag">${t}</span>`).join("")}</div>`;
        if (c.notice)
          h += `<div class="notice ${c.notice.cls}">${c.notice.text}</div>`;
        if (c.formula)
          h += `<div class="formula-box"><div class="formula">${c.formula.expr}</div><div class="formula-vars">${c.formula.vars.replace(/\n/g, "<br>")}</div></div>`;
        return h + `</div>`;
      }

      function column(col) {
        if (!col) return "";
        let h = `<div>`;
        if (col.cards) col.cards.forEach((c) => (h += card(c)));
        if (col.chart)
          h += `<div class="chart-wrap"><canvas id="${col.chart}"></canvas><p class="chart-caption">${col.caption || ""}</p></div>`;
        return h + `</div>`;
      }

      function buildSlide(s, idx) {
        const el = document.createElement("div");
        el.className = "slide";
        el.dataset.index = idx;

        // title slide
        if (s.type === "title") {
          el.innerHTML = `
      <div class="title-wrap">
        <div class="kicker">${META.department} &middot; ${META.university}</div>
        <h1>${META.title}</h1>
        <div class="members-grid">
          ${META.members.map((m) => `<div class="member-card"><div class="mname">${m.name}</div><div class="mid">${m.id}</div></div>`).join("")}
        </div>
        <div class="dept-line">Presented to <span>${META.department}</span> &middot; ${META.university}</div>
      </div>`;
          return el;
        }

        if (s.type === "last_Slide") {
          el.innerHTML = `
      <div class="title-wrap">
        
        <h1>Thank You</h1>
       
      </div>`;
          return el;
        }

        // body
        let body = "";

        if (s.layout === "two-col") {
          body = `<div class="col-2">${column(s.left)}${column(s.right)}</div>`;
          if (s.footer)
            body += `<div class="card" style="margin-top:18px"><p>${s.footer}</p></div>`;
        } else if (s.layout === "table") {
          body = `
      <table class="cmp-table">
        <thead><tr>${s.tableHead.map((h) => `<th>${h}</th>`).join("")}</tr></thead>
        <tbody>${s.tableRows.map((r) => `<tr>${r.map((c) => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>
      </table>`;
        } else if (s.layout === "measures") {
          body = `
      <div class="col-3">
        ${s.measures.map((m) => `<div class="measure-card"><div class="abbr">${m.abbr}</div><div class="full">${m.full}</div></div>`).join("")}
      </div>`;
          if (s.footer)
            body += `<div class="card" style="margin-top:20px"><p>${s.footer}</p></div>`;
        } else if (s.layout === "conclusion") {
          body = `
      <div class="conclusion-grid">
        ${s.conclusions
          .map(
            (c) => `
          <div class="conclusion-card">
            <div class="icon">${c.icon}</div>
            <div><h4>${c.heading}</h4><p>${c.body}</p></div>
          </div>`,
          )
          .join("")}
      </div>
      <div style="margin-top:18px;text-align:center;font-size:14px;color:var(--muted)">
        Thank you &middot; <span style="color:var(--gold)">${META.title}</span> &middot; ${META.department}
      </div>`;
        }

        el.innerHTML = `
    <div class="content-wrap">
      <div class="s-label">${s.label || ""}</div>
      <h2 class="s-title">${s.title}</h2>
      ${body}
    </div>`;
        return el;
      }

      // build DOM
      const deck = document.getElementById("deck");
      SLIDES.forEach((s, i) => deck.appendChild(buildSlide(s, i)));

      // ── init charts ──
      const BASE_OPTS = {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: {
            labels: { color: "#ccc", font: { family: "DM Sans", size: 12 } },
          },
        },
        scales: {
          x: {
            ticks: { color: "#888", font: { size: 11 } },
            grid: { color: "rgba(255,255,255,.05)" },
          },
          y: {
            ticks: { color: "#888", font: { size: 11 } },
            grid: { color: "rgba(255,255,255,.05)" },
          },
        },
      };

      Object.entries(CHARTS).forEach(([id, cfg]) => {
        const el = document.getElementById(id);
        if (!el) return;
        let opts;
        if (cfg.type === "radar") {
          opts = {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { labels: { color: "#ccc", font: { size: 11 } } },
            },
            scales: {
              r: {
                ticks: { display: false },
                grid: { color: "rgba(255,255,255,.08)" },
                pointLabels: { color: "#aaa", font: { size: 11 } },
              },
            },
          };
        } else if (cfg.type === "doughnut") {
          opts = {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: {
                position: "bottom",
                labels: { color: "#ccc", font: { size: 12 } },
              },
            },
          };
        } else {
          opts = JSON.parse(JSON.stringify(BASE_OPTS));
          if (cfg.hideLegend) opts.plugins.legend = { display: false };
        }
        new Chart(el, {
          type: cfg.type,
          data: { labels: cfg.labels, datasets: cfg.datasets },
          options: opts,
        });
      });

      // ── navigation ──
      const slides = document.querySelectorAll(".slide");
      const total = slides.length;
      let cur = 0,
        busy = false;

      function goTo(next, dir) {
        if (busy || next === cur || next < 0 || next >= total) return;
        busy = true;
        const old = slides[cur],
          nw = slides[next];
        old.classList.add(dir === "next" ? "exit-l" : "exit-r");
        nw.style.opacity = "1";
        nw.classList.add(dir === "next" ? "enter-r" : "enter-l");
        setTimeout(() => {
          old.classList.remove("active", "exit-l", "exit-r");
          old.style.opacity = "";
          nw.classList.remove("enter-r", "enter-l");
          nw.classList.add("active");
          cur = next;
          sync();
          busy = false;
        }, 500);
      }

      function sync() {
        document.getElementById("slideNum").textContent =
          `${cur + 1} / ${total}`;
        document.getElementById("progress").style.width =
          `${((cur + 1) / total) * 100}%`;
        document.getElementById("prevBtn").style.opacity =
          cur === 0 ? ".35" : "1";
        document.getElementById("nextBtn").style.opacity =
          cur === total - 1 ? ".35" : "1";
      }

      slides[0].classList.add("active");
      sync();

      document
        .getElementById("nextBtn")
        .addEventListener("click", () => goTo(cur + 1, "next"));
      document
        .getElementById("prevBtn")
        .addEventListener("click", () => goTo(cur - 1, "prev"));
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight" || e.key === "ArrowDown")
          goTo(cur + 1, "next");
        if (e.key === "ArrowLeft" || e.key === "ArrowUp") goTo(cur - 1, "prev");
      });
    </script>
